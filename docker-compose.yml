services:

  # ── MySQL database ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: eurovision_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: eurovision_db
      MYSQL_USER: eurovision
      MYSQL_PASSWORD: eurovisionpass
    ports:
      - "3306:3306"
    volumes:
      # Named volume so data survives container restarts
      - mysql_data:/var/lib/mysql
      # Any .sql files here run automatically on first start
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot application ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eurovision_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/eurovision_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: eurovision
      SPRING_DATASOURCE_PASSWORD: eurovisionpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
