# ============================================================
# Eurovision 2025 Backend — Application Configuration
# Values can be overridden by environment variables (Docker)
# ============================================================

# --- Server ---
server.port=8080

# --- Database ---
# Defaults for local dev; Docker Compose injects real values via env vars
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/eurovision_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# create-drop = rebuild schema on every boot (good for dev/demo)
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- Jackson (pretty JSON responses) ---
spring.jackson.serialization.indent-output=true
